<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Selamat Tahun Baru Imlek</title>
    <style>
        :root {
            --red: #d32f2f;
            --gold: #ffd700;
            --dark-red: #8b0000;
            --cream: #fff5e6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-red);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--gold);
        }

        /* Dekorasi Tirai/Bingkai Samping */
        body::before, body::after {
            content: '';
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent);
            border-left: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
            z-index: 1;
        }
        body::before { left: 20px; }
        body::after { right: 20px; }

        /* Container Ucapan */
        .card {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            border: 2px solid var(--gold);
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: fadeIn 2s ease-out;
        }

        /* Ornamen Sudut */
        .card::before {
            content: '🧧';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        .chinese-main {
            font-size: 5rem;
            margin: 0;
            display: block;
            filter: drop-shadow(0 0 10px var(--gold));
            animation: glow 3s infinite alternate;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 20px 0;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            display: inline-block;
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--cream);
            font-style: italic;
        }

        /* Animasi Lampion Kecil di Pojok */
        .mini-lantern {
            position: absolute;
            top: 20px;
            font-size: 2rem;
            animation: swing 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px var(--gold)); }
            to { filter: drop-shadow(0 0 20px #fff); }
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        /* Responsif untuk HP */
        @media (max-width: 480px) {
            .chinese-main { font-size: 3.5rem; }
            h1 { font-size: 1.5rem; }
            .card { margin: 20px; padding: 20px; }
            body::before, body::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="mini-lantern" style="left: 10%;">🏮</div>
    <div class="mini-lantern" style="right: 10%; animation-delay: 1s;">🏮</div>

    <div class="card">
        <span class="chinese-main">恭贺新禧</span>
        <h1>Gong Xi Fa Cai</h1>
        
        <div class="message">
            <p>Di ambang tahun yang baru ini,</p>
            <p>Semoga setiap langkah kita dipenuhi keberuntungan,<br>
               setiap usaha membuahkan kemakmuran,<br>
               dan setiap hari berlimpah kebahagiaan.</p>
            <p style="color: var(--gold); font-weight: bold; margin-top: 30px;">
                Selamat Tahun Baru Imlek 2026
            </p>
        </div>
    </div>

</body>
</html>
