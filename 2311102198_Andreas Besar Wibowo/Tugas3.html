<!DOCTYPE html>
<html>

<head>
    <title>Perayaan Imlek</title>

    <style>
        body {
            background: #8B0000;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 60px;
            color: gold;
            text-shadow: 2px 2px 8px black;
        }

        .lampion {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px;
            border: 5px solid gold;
            display: inline-block;
            overflow: hidden;
        }

        .lampion img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text {
            font-size: 25px;
            margin-top: 20px;
        }

        .gambar {
            width: 250px;
            margin-top: 20px;
            border: 4px solid gold;
            border-radius: 10px;
        }

        .lampion-container {
            margin-top: 30px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Gong Xi Fa Cai</h1>

        <img src="Images/china.png" class="gambar" alt="Dekorasi Imlek">

        <div class="lampion-container">

            <div class="lampion">
                <img src="Images/lampion.png" alt="Lampion 1">
            </div>

            <div class="lampion">
                <img src="Images/lampion.png" alt="Lampion 2">
            </div>

        </div>

        <p class="text">
            Selamat Tahun Baru Imlek<br>
            Semoga Tahun Ini Membawa Keberuntungan dan Rezeki
        </p>

    </div>

</body>

</html>
