<!DOCTYPE html>
<html>

<head>
    <title>Happy Chinese New Year</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle, #cc0000, #660000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: gold;
        }

        /* lampion atas */
        .lampion {
            font-size: 40px;
            letter-spacing: 20px;
            margin-bottom: 30px;
        }

        /* kartu ucapan */
        .card {
            background: #8b0000;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid gold;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
        }

        .symbol {
            font-size: 60px;
            margin: 15px 0;
        }

        /* dekorasi bawah */
        .decor {
            font-size: 35px;
            margin-top: 20px;
            letter-spacing: 10px;
        }
    </style>
</head>

<body>

    <div class="lampion">
        🏮 🏮 🏮 🏮 🏮
    </div>

    <div class="card">

        <h1>🐉 Happy Chinese New Year 🐉</h1>

        <p>Gong Xi Fa Cai</p>

        <div class="symbol">福</div>

        <p>Semoga tahun ini membawa keberuntungan, kesehatan, dan kebahagiaan</p>

        <div class="decor">
            🧧 🧧 🧧 🧧
        </div>

    </div>

</body>

</html>
