<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Tahun Baru Imlek 2026</title>
    <style>
        /* Dasar & Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #8B0000; /* Merah Marun */
            background-image: radial-gradient(circle, #b31217 20%, #700101 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #FFD700; /* Emas */
        }

        /* Kontainer Utama */
        .card {
            text-align: center;
            border: 5px double #FFD700;
            padding: 50px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        .chinese-text {
            font-size: 4rem;
            display: block;
            margin-bottom: 20px;
        }

        /* Animasi Lampion */
        .lantern-container {
            position: absolute;
            top: -20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }

        .lantern {
            width: 60px;
            height: 50px;
            background: #ff4d4d;
            border-radius: 40% 40% 40% 40%;
            position: relative;
            border: 2px solid #FFD700;
            animation: swing 3s ease-in-out infinite alternate;
            transform-origin: top center;
        }

        .lantern::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: #FFD700;
        }

        .lantern::after {
            content: "";
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 20px;
            background: #FFD700;
        }

        @keyframes swing {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        /* Ornamen Awan (CSS Shapes) */
        .cloud {
            position: absolute;
            width: 150px;
            height: 50px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50px;
            filter: blur(5px);
            z-index: 1;
            animation: moveCloud 20s linear infinite;
        }

        @keyframes moveCloud {
            from { left: -200px; }
            to { left: 110%; }
        }

        /* Button Efek Hover (CSS Only) */
        .wish-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: #FFD700;
            color: #8B0000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .wish-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #FFD700;
        }
    </style>
</head>
<body>

    <div class="lantern-container">
        <div class="lantern"></div>
        <div class="lantern" style="animation-delay: -1s;"></div>
        <div class="lantern"></div>
    </div>

    <div class="cloud" style="top: 10%; animation-duration: 25s;"></div>
    <div class="cloud" style="top: 70%; animation-duration: 30s; animation-delay: -5s;"></div>

    <div class="card">
        <span class="chinese-text">新年快乐</span>
        <h1>Gong Xi Fa Cai</h1>
        <p>Semoga tahun ini penuh dengan keberuntungan, <br> kesehatan, dan kemakmuran bagi kita semua.</p>
        <button class="wish-btn">Buka Angpao Virtual</button>
    </div>

</body>
</html>
